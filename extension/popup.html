<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 320px;
      font-family: system-ui, -apple-system, sans-serif;
      margin: 0;
      padding: 16px;
      background: #0d1117;
      color: #c9d1d9;
    }
    h2 {
      font-size: 16px;
      margin-top: 0;
      margin-bottom: 8px;
      color: #f0f6fc;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    p {
      font-size: 12px;
      color: #8b949e;
      margin-bottom: 16px;
    }
    .field {
      margin-bottom: 12px;
    }
    label {
      display: block;
      font-size: 11px;
      color: #8b949e;
      margin-bottom: 4px;
      font-weight: 600;
    }
    input {
      width: 100%;
      box-sizing: border-box;
      background: #161b22;
      border: 1px solid #30363d;
      color: #f0f6fc;
      padding: 8px;
      border-radius: 6px;
      font-size: 12px;
    }
    button {
      width: 100%;
      background: linear-gradient(135deg, #f97316 0%, #ea580c 100%);
      color: white;
      border: none;
      padding: 10px;
      border-radius: 6px;
      font-weight: 600;
      font-size: 13px;
      cursor: pointer;
      margin-top: 8px;
    }
    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    #status {
      margin-top: 12px;
      font-size: 12px;
      text-align: center;
    }
    .success { color: #3fb950; }
    .error { color: #f85149; }
  </style>
</head>
<body>
  <h2>🚀 CareerPilot Importer</h2>
  <p>Open a LinkedIn profile page and click import below.</p>
  
  <div class="field">
    <label>CareerPilot Backend URL</label>
    <input type="text" id="apiUrl" value="http://localhost:5000" />
  </div>

  <div class="field">
    <label>Auth Token (Bearer Token)</label>
    <input type="text" id="authToken" placeholder="Paste your app JWT token" />
  </div>

  <button id="importBtn">Import Profile to CareerPilot</button>
  <div id="status"></div>

  <script src="popup.js"></script>
</body>
</html>
